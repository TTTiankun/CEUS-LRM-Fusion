train_dir: data/ceus/train
val_dir: data/ceus/val
test_dir: data/ceus/test

save_dir: runs/ceus_gru
device: cuda
random_seed: 42

batch_size: 16
epochs: 150
optimizer: adamw
lr: 0.0005
grad_clip: 1.0
label_smoothing: 0.02
auxiliary_loss_weight: 0.2
early_stop_patience: 20
min_delta: 0.0
use_cosine_scheduler: true

attention_dim: 32
gru_dims: [128, 64]
num_attention_heads: 4
use_attention_mapper: true
dropout: 0.15

use_augmentation: true
augmentations:
  gaussian_noise:
    enable: false
    noise_std: 0.02
  time_mask:
    enable: false
    mask_pct: 0.10
    max_mask_len: 3
  feature_mask:
    enable: false
    feat_mask_pct: 0.10
  temporal_jitter:
    enable: false
    window_size: 3
    jitter_prob: 0.20
  time_warp:
    enable: false
    stretch_sigma: 0.10
    stretch_prob: 0.20
